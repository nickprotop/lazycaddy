name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            name: lazycaddy-linux-x64
          - rid: linux-arm64
            name: lazycaddy-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Build the app project directly (not the .sln): the .sln references the local
      # ../ConsoleEx sibling, which is absent in CI. The csproj falls back to the
      # SharpConsoleUI NuGet package when that sibling doesn't exist.
      - name: Restore
        run: dotnet restore lazycaddy.csproj -r ${{ matrix.rid }}

      - name: Build
        run: |
          dotnet publish lazycaddy.csproj -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./publish/${{ matrix.rid }}

      - name: Rename binary
        run: mv ./publish/${{ matrix.rid }}/lazycaddy ./publish/${{ matrix.rid }}/${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ./publish/${{ matrix.rid }}/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Copy all platform binaries
          for dir in ./artifacts/lazycaddy-*/; do
            cp "$dir"/* release/ 2>/dev/null || true
          done
          cp install.sh release/
          cp uninstall.sh release/
          chmod +x release/lazycaddy-linux-* release/*.sh 2>/dev/null || true

          # Generate checksums
          cd release
          sha256sum * > SHA256SUMS
          cd ..

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Multi-line output
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            # LazyCaddy ${{ steps.version.outputs.VERSION }}

            A terminal UI for managing a running [Caddy](https://caddyserver.com/) server
            through its admin API, built with SharpConsoleUI.

            ## Installation

            **Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/nickprotop/lazycaddy/master/install.sh | bash
            ```

            ## Manual Download

            | Platform | Binary |
            |----------|--------|
            | Linux x64 | `lazycaddy-linux-x64` |
            | Linux ARM64 | `lazycaddy-linux-arm64` |

            ## Usage

            ```bash
            lazycaddy                              # connect to http://localhost:2019
            lazycaddy --url http://host:2019       # point at a different admin API
            ```

            ## Changes

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Checksums

            See `SHA256SUMS` in the release assets.
          draft: false
          prerelease: false
